{% extends "base.html" %}

{% block title %}Request Rejected | CryoCheck{% endblock %}

{% block content %}
  <section class="error-panel" aria-labelledby="error-title">
    <p class="error-panel__code">400</p>
    <h1 id="error-title">Request could not be processed</h1>
    <p>CryoCheck could not safely process that request. Return to Import and try again.</p>
    <a class="button button--secondary" href="{{ url_for('main.index') }}">Return to Import</a>
  </section>
{% endblock %}
