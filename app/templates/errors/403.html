{% extends "base.html" %}

{% block title %}Access Denied | CryoCheck{% endblock %}

{% block content %}
  <section class="error-panel" aria-labelledby="error-title">
    <p class="error-panel__code">403</p>
    <h1 id="error-title">Access denied</h1>
    <p>CryoCheck cannot allow that request.</p>
    <a class="button button--secondary" href="{{ url_for('main.index') }}">
      Return to Import
    </a>
  </section>
{% endblock %}
