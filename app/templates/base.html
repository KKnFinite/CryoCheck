<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="CryoCheck standalone deice log audit system.">
    <meta name="theme-color" content="#071b33">
    <title>{% block title %}CryoCheck{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ url_for('main.index') }}" aria-label="CryoCheck home">
          <span class="brand__mark" aria-hidden="true">&#10052;</span>
          <span class="brand__name">CryoCheck</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a
            class="site-nav__link{% if active_page == 'import' %} site-nav__link--active{% endif %}"
            href="{{ url_for('main.index') }}"
            {% if active_page == "import" %}aria-current="page"{% endif %}
          >
            Import
          </a>
          <a
            class="site-nav__link{% if active_page == 'rules' %} site-nav__link--active{% endif %}"
            href="{{ url_for('main.rules') }}"
            {% if active_page == "rules" %}aria-current="page"{% endif %}
          >
            Rules
          </a>
        </nav>
      </header>

      <main id="main-content" class="site-main">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer">
        <p class="site-footer__brand">CryoCheck</p>
        <p>Standalone Deice Log Audit System</p>
      </footer>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
